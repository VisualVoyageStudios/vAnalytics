<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Voyager Analytics</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-wrapper">

    <a href="../index.html" class="auth-brand">
        <div class="auth-brand-icon"><i class="fas fa-rocket"></i></div>
        <span class="auth-brand-text">VOYAGER</span>
    </a>

    <h1 class="welcome-note">
       <i class="fa fa-handshake">Welcome to Voyager Analytics</i>
    </h1>


    <div class="auth-card">

        <h1>Create Account</h1>

        <p>Start tracking your trading journey</p>

        <form id="registerForm">

            <input
                type="email"
                id="registerEmail"
                placeholder="Email Address"
                required
            >

            <input
                type="password"
                id="registerPassword"
                placeholder="Password"
                required
            >

            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm Password"
                required
            >

            <button type="submit">
                Create Account
            </button>

        </form>

        <p>
            Already have an account?
            <a href="login.html">
                Login
            </a>
        </p>

    </div>
    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
