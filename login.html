<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Voyager Analytics</title>

    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>

<div class="auth-container">
  <div class="auth-wrapper">

    <a href="../index.html" class="auth-brand">
        <div class="auth-brand-icon"><i class="fas fa-rocket"></i></div>
        <span class="auth-brand-text">VOYAGER</span>
    </a>

    <h1 class="welcome-note">
       <i class="fa fa-handshake">Welcome Back!</i>
    </h1>


    <div class="auth-card">

        <p>Login to your Voyager account</p>

        <form id="loginForm">

            <input
                type="email"
                id="email"
                placeholder="Email Address"
                required
            >

            <input
                type="password"
                id="password"
                placeholder="Password"
                required
            >

            <button type="submit">
                Login
            </button>

        </form>

        <p>
            Don't have an account?
            <a href="register.html">
                Register
            </a>
        </p>

    </div>

    </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
