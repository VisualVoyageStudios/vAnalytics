<div class="dashboard-container">
    <main class="main-content">

        <div class="page-header">
            <h2>Trading Accounts</h2>

            <button id="connectAccountBtn" class="btn-primary" style="border:none; cursor:pointer;">
                + Connect Account
            </button>
        </div>

        <div class="table-card">

            <table class="skeleton">

                <thead>
                    <tr>
                        <th>Broker</th>
                        <th>Account</th>
                        <th>Server</th>
                        <th>Status</th>
                        <th>Last Sync</th>
                    </tr>
                </thead>

                <tbody id="accountsTable">

                </tbody>

            </table>

        </div>

    </main>
</div>

<div id="accountModal" class="modal">

    <div class="modal-content">

        <button type="button" class="modal-close" id="closeAccountModal"><i class="fas fa-xmark"></i></button>

        <h2>Add Trading Account</h2>
        <p style="color:var(--muted); font-size:13px; margin-top:-8px;">
            Give it a name so you can tell your accounts apart. You'll sync real trades separately via the Sync Agent in Settings.
        </p>

        <form id="accountForm">

            <input
                type="text"
                id="accountName"
                placeholder="Account Name (e.g. Main FTMO, Personal)"
                required
            >

            <input
                type="text"
                id="broker"
                placeholder="Broker (e.g. FTMO, IC Markets)"
                required
            >

            <button type="submit">
                Add Account
            </button>

        </form>

    </div>

</div>
