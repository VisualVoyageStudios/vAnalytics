<div class="dashboard-container">

    <main class="main-content">

        <div class="journal-form">
            <h3>New Entry</h3>

            <form id="journalForm">

                <select id="tradeId" required>
                    <option value="">Select Trade <i class="info-tip" data-tip="Pick the trade you want to write about. Journaling each trade helps you spot patterns in your behaviour over time.">i</i>
</option>
                </select>

                <select id="emotion">
                    <option value="">Select Emotion</option>
                    <option value="Confident">Confident</option>
                    <option value="Calm">Calm</option>
                    <option value="Fearful">Fearful</option>
                    <option value="Greedy">Greedy</option>
                    <option value="Frustrated">Frustrated</option>
                </select>

                <!-- Replace the lesson textarea block with this -->
                <div style="margin-bottom:4px;">
                    <p style="font-size:11px; color:var(--muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px;">
                        Quick Lesson Tags
                    </p>
                    <div id="lessonChips" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px;"></div>
                </div>
                <textarea
                    id="lesson"
                    placeholder="What did you learn from this trade?"
                ></textarea>
                <div style="display:flex; gap:8px; margin-top:6px; margin-bottom:12px;">
                    <input type="text" id="customLessonInput" placeholder="Add custom lesson tag…" style="
                        flex:1; padding:8px 12px; border-radius:8px;
                        border:1px solid var(--border); background:var(--bg); color:white; font-size:12px;
                    ">
                    <button type="button" id="addLessonBtn" style="
                        background:var(--card); border:1px solid var(--border);
                        color:white; padding:8px 14px; border-radius:8px; cursor:pointer; font-size:12px;
                    ">+ Save</button>
                </div>
                
                <!-- Replace the mistake textarea block with this -->
                <div style="margin-bottom:4px;">
                    <p style="font-size:11px; color:var(--muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.5px;">
                        Quick Mistake Tags
                    </p>
                    <div id="mistakeChips" style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:8px;"></div>
                </div>
                <textarea
                    id="mistake"
                    placeholder="Any mistakes made?"
                ></textarea>
                <div style="display:flex; gap:8px; margin-top:6px; margin-bottom:12px;">
                    <input type="text" id="customMistakeInput" placeholder="Add custom mistake tag…" style="
                        flex:1; padding:8px 12px; border-radius:8px;
                        border:1px solid var(--border); background:var(--bg); color:white; font-size:12px;
                    ">
                    <button type="button" id="addMistakeBtn" style="
                        background:var(--card); border:1px solid var(--border);
                        color:white; padding:8px 14px; border-radius:8px; cursor:pointer; font-size:12px;
                    ">+ Save</button>
                </div>
                <input
                    type="number"
                    id="rating"
                    min="1"
                    max="10"
                    placeholder="Trade Rating (1-10)"
                >

                <button type="submit">
                    Save Entry
                </button>

            </form>
        </div>

        <h3 style="margin: 30px 0 15px">Past Entries</h3>

        <div id="journalList"></div>


        <!-- Mistake Pattern Detection -->
        <div style="margin-top:40px;">
            <div class="section-card-header" style="margin-bottom:16px;">
                <div>
                    <h3 style="display:flex; align-items:center; gap:8px;">
                        <i class="fas fa-brain" style="color:var(--primary); font-size:16px;"></i>
                        Mistake Pattern Analysis <i class="info-tip" data-tip="AI analyses your journal entries to find recurring behaviour mistakes — like always moving stop losses or trading out of boredom. Needs at least 3 entries.">i</i>
                    </h3>
                    <p style="color:var(--muted); font-size:13px; margin-top:4px;">
                        AI-powered analysis of recurring behavioural patterns in your journal
                    </p>
                </div>
                <button id="refreshPatternsBtn" style="
                    background: var(--card);
                    border: 1px solid var(--border);
                    color: white;
                    padding: 8px 16px;
                    border-radius: 10px;
                    cursor: pointer;
                    font-size: 13px;
                ">
                    <i class="fas fa-rotate" style="margin-right:6px;"></i>Refresh
                </button>
            </div>
        
            <div id="patternsList"></div>
        </div>
