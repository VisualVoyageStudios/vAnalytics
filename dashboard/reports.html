<div class="dashboard-container">

    <main class="main-content">

        <header class="page-header">
            <h2>Performance Reports</h2>
        </header>

        <!-- Report Card -->
        <div class="metric-card" style="max-width: 600px; margin-bottom: 20px;">
            <div style="display:flex; align-items:center; gap:16px; margin-bottom:20px;">
                <div style="
                    width: 52px; height: 52px;
                    background: rgba(239,68,68,0.1);
                    border-radius: 14px;
                    display:flex; align-items:center; justify-content:center;
                    font-size: 22px; color: #ef4444;
                ">
                    <i class="fas fa-file-pdf"></i>
                </div>
                <div>
                    <p style="font-weight:700; font-size:16px;">Full Performance Report</p>
                    <p style="color:var(--muted); font-size:13px; margin-top:4px;">
                        PDF with stats, monthly breakdown, top trades and journal summary
                    </p>
                </div>
            </div>

            <ul style="list-style:none; margin-bottom:24px; display:flex; flex-direction:column; gap:10px;">
                <li style="font-size:13px; color:var(--muted); display:flex; align-items:center; gap:10px;">
                    <i class="fas fa-check" style="color:#00d4ff;"></i> Cover page with key KPIs
                </li>
                <li style="font-size:13px; color:var(--muted); display:flex; align-items:center; gap:10px;">
                    <i class="fas fa-check" style="color:#00d4ff;"></i> Full performance summary
                </li>
                <li style="font-size:13px; color:var(--muted); display:flex; align-items:center; gap:10px;">
                    <i class="fas fa-check" style="color:#00d4ff;"></i> Monthly profit breakdown
                </li>
                <li style="font-size:13px; color:var(--muted); display:flex; align-items:center; gap:10px;">
                    <i class="fas fa-check" style="color:#00d4ff;"></i> Best and worst trades
                </li>
                <li style="font-size:13px; color:var(--muted); display:flex; align-items:center; gap:10px;">
                    <i class="fas fa-check" style="color:#00d4ff;"></i> Journal emotion breakdown
                </li>
            </ul>

            <button id="generateBtn" class="btn-primary" style="
                width: 100%;
                padding: 14px;
                border: none;
                border-radius: 12px;
                cursor: pointer;
                font-size: 15px;
                font-weight: 600;
            ">
                <i class="fas fa-download" style="margin-right:8px;"></i>
                Generate & Download PDF
            </button>

            <p id="reportMsg" style="margin-top:12px; font-size:13px; text-align:center;"></p>
        </div>

    </main>
</div>

<!-- jsPDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<script src="../js/api.js"></script>
<script src="../js/pdfReport.js"></script>
<script src="../js/pgAnime.js"></script>
<script src="../js/nav.js"></script>
<script>
    const token = localStorage.token;
    if(!token) window.location.href = "../login.html";

    document.getElementById("generateBtn").addEventListener("click", async () => {
        const btn = document.getElementById("generateBtn");
        const msg = document.getElementById("reportMsg");

        btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:8px;"></i>Generating…';
        btn.disabled  = true;
        msg.textContent = "";

        try {
            await generatePDFReport(token);
            msg.style.color = "var(--success)";
            msg.textContent = "Report downloaded successfully!";
        } catch(err) {
            console.error(err);
            msg.style.color = "var(--danger)";
            msg.textContent = "Failed to generate report. Try again.";
        }

        btn.innerHTML = '<i class="fas fa-download" style="margin-right:8px;"></i>Generate & Download PDF';
        btn.disabled  = false;
    });
</script>
