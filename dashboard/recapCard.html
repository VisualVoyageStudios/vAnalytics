<div class="dashboard-container">
    <main class="main-content">

        <header class="page-header">
            <h2>Weekly Recap Card <i class="info-tip" data-tip="A shareable summary card of your week — profit, win rate, streak and best session. Download as PNG and share on social media.">i</i></h2>
            <div style="display:flex; gap:10px;">
                <button class="btn-primary" id="generateBtn" style="border:none; cursor:pointer; padding:10px 18px; border-radius:10px; font-size:13px;">
                    <i class="fas fa-rotate" style="margin-right:6px;"></i>Generate
                </button>
                <button id="downloadBtn" style="
                    background: var(--card);
                    border: 1px solid var(--border);
                    color: white;
                    padding: 10px 18px;
                    border-radius: 10px;
                    cursor: pointer;
                    font-size: 13px;
                    display: none;
                ">
                    <i class="fas fa-download" style="margin-right:6px;"></i>Download PNG
                </button>
            </div>
        </header>

        <p style="color:var(--muted); font-size:13px; margin-bottom:28px; max-width:600px;">
            Generate a shareable weekly performance card. Download it and share on Twitter, Discord, or anywhere you post your trading updates.
        </p>

        <!-- Preview area -->
        <div id="previewArea" style="
            display: flex;
            justify-content: center;
            margin-bottom: 32px;
        ">
            <div style="
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 60px 40px;
                text-align: center;
                color: var(--muted);
                max-width: 500px;
                width: 100%;
            " id="placeholder">
                <i class="fas fa-share-nodes" style="font-size:2.5rem; opacity:0.2; display:block; margin-bottom:16px;"></i>
                <p style="font-size:14px;">Click Generate to create your weekly recap card</p>
            </div>
            <canvas id="recapCanvas" style="display:none; border-radius:16px; max-width:100%;"></canvas>
        </div>

    </main>
</div>
