<script>
const token = localStorage.token;
if(!token) window.location.href = "../login.html";

async function loadLiveRates(){
    try {
        const res  = await fetch(`${API_URL}/macro/matrix`, {
            headers: { "Authorization": `Bearer ${token}` }
        });
        const data = await res.json();

        // patch live rates into the three auto-fetched CBs
        ["USD", "EUR", "GBP"].forEach(ccy => {
            const row = data.rows?.find(r => r.currency === ccy);
            const cb  = CENTRAL_BANKS.find(c => c.ccy === ccy);
            if(row && cb){
                cb.prev_rate = cb.rate;
                cb.rate      = row.rate;
                cb.stance    = row.rate_stance;
            }
        });

    } catch(err) {
        console.warn("Could not fetch live rates — using hardcoded values", err);
    }

    renderRateStrip();
    renderCBCards();
}

window.onload = loadLiveRates;


const CENTRAL_BANKS = [

function daysUntil(dateStr){
    const diff = new Date(dateStr) - new Date();
    return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function stanceColor(stance){
    if(stance === "hiking")  return "#22c55e";
    if(stance === "cutting") return "#ef4444";
    return "#94a3b8";
}

function stanceIcon(stance){
    if(stance === "hiking")  return "fa-arrow-trend-up";
    if(stance === "cutting") return "fa-arrow-trend-down";
    return "fa-minus";
}


function renderRateStrip(){
    const strip = document.getElementById("rateStrip");

    // sort by rate descending
    const sorted = [...CENTRAL_BANKS].sort((a, b) => b.rate - a.rate);

    strip.innerHTML = sorted.map(cb => {
        const col     = stanceColor(cb.stance);
        const change  = cb.rate - cb.prev_rate;
        const sign    = change > 0 ? "+" : "";

        return `
            <div style="
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 12px;
                padding: 14px;
                text-align: center;
                border-top: 3px solid ${col};
            ">
                <div style="font-size:18px; margin-bottom:4px;">${cb.flag}</div>
                <div style="font-weight:700; font-size:11px; color:var(--muted); margin-bottom:6px;">${cb.abbr}</div>
                <div style="font-size:1.3rem; font-weight:800; color:white;">${cb.rate}%</div>
                <div style="font-size:10px; margin-top:4px; color:${col}; font-weight:600;">
                    <i class="fas ${stanceIcon(cb.stance)}" style="font-size:9px;"></i>
                    ${sign}${change.toFixed(2)}%
                </div>
            </div>
        `;
    }).join("");
}


function renderCBCards(){
    const grid = document.getElementById("cbGrid");

    grid.innerHTML = CENTRAL_BANKS.map(cb => {
        const col      = stanceColor(cb.stance);
        const days     = daysUntil(cb.next_meeting);
        const urgency  = days <= 7  ? "#ef4444"
                       : days <= 21 ? "#f59e0b"
                       : "var(--muted)";

        const meetingLabel = days < 0
            ? "Meeting passed"
            : days === 0
            ? "Meeting today"
            : `${days} day${days === 1 ? "" : "s"} until next meeting`;

        return `
            <div style="
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 22px;
                position: relative;
                overflow: hidden;
            ">
                <!-- accent bar -->
                <div style="
                    position:absolute; top:0; left:0; right:0;
                    height:3px; background:${col};
                "></div>

                <!-- header -->
                <div style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:16px;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="font-size:24px;">${cb.flag}</span>
                        <div>
                            <div style="font-weight:700; font-size:14px;">${cb.name}</div>
                            <div style="font-size:11px; color:var(--muted); margin-top:2px;">${cb.chair}</div>
                        </div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-size:1.5rem; font-weight:800;">${cb.rate}%</div>
                        <span style="
                            font-size:10px; font-weight:700;
                            color:${col};
                            background:${col}15;
                            padding:2px 8px; border-radius:10px;
                        ">
                            <i class="fas ${stanceIcon(cb.stance)}" style="font-size:9px;"></i>
                            ${cb.stance.charAt(0).toUpperCase() + cb.stance.slice(1)}
                        </span>
                    </div>
                </div>

                <!-- bias -->
                <p style="font-size:12px; color:var(--muted); line-height:1.7; margin-bottom:14px;">
                    ${cb.bias}
                </p>

                <!-- stats grid -->
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px;">
                    <div style="background:rgba(255,255,255,0.03); border-radius:8px; padding:10px;">
                        <div style="font-size:10px; color:var(--muted); margin-bottom:3px;">Last change</div>
                        <div style="font-size:12px; font-weight:600;">${cb.last_change}</div>
                    </div>
                    <div style="background:rgba(255,255,255,0.03); border-radius:8px; padding:10px;">
                        <div style="font-size:10px; color:var(--muted); margin-bottom:3px;">Forward guidance</div>
                        <div style="font-size:12px; font-weight:600; line-height:1.4;">${cb.dot_plot}</div>
                    </div>
                </div>

                <!-- mandate -->
                <div style="
                    font-size:11px; color:var(--muted);
                    background:rgba(255,255,255,0.02);
                    border-radius:8px; padding:8px 12px;
                    margin-bottom:12px;
                    border-left:2px solid ${col};
                ">
                    <i class="fas fa-scale-balanced" style="margin-right:4px; font-size:10px;"></i>
                    ${cb.mandate}
                </div>

                <!-- next meeting -->
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-size:10px; color:var(--muted); margin-bottom:2px;">Next meeting</div>

                        </div>

                        font-size:11px; font-weight:700;
                        color:${urgency};
                        background:${urgency}15;
                        padding:4px 10px; border-radius:10px;
                    ">
                        ${meetingLabel}
                    </span>
                </div>
            </div>
        `;
    }).join("");
}


window.onload = () => {
    renderRateStrip();
    renderCBCards();
