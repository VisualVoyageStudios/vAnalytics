<div class="dashboard-container">
    <main class="main-content">

        <header class="page-header">
            <div>
                <h2>Currency Intelligence</h2>
                <p style="color:var(--muted); font-size:13px; margin-top:4px;">
                    Per-currency overview combining fundamentals, strength and economic calendar
                </p>
            </div>
            <button class="btn-primary" id="refreshBtn" style="border:none; padding:10px 18px; border-radius:10px; cursor:pointer; font-size:13px;">
                <i class="fas fa-rotate" style="margin-right:6px;"></i>Refresh
            </button>
        </header>

        <!-- Currency selector tabs -->
        <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px;" id="ccyTabs"></div>

        <!-- Main currency card -->
        <div id="ccyCard" style="margin-bottom:32px;">
            <div style="color:var(--muted); padding:60px; text-align:center;">
                <i class="fas fa-spinner fa-spin" style="font-size:2rem; display:block; margin-bottom:16px; opacity:0.3;"></i>
                Loading currency data…
            </div>
        </div>

        <!-- Relevant calendar events -->
        <div class="section-heading" style="margin-bottom:16px;">
            <i class="fas fa-calendar"></i> Upcoming Events for Selected Currency
        </div>
        <div id="calendarEvents" style="margin-bottom:40px;"></div>

    </main>
</div>

<script src="../js/api.js"></script>
<script src="../js/pgAnime.js"></script>
<script src="../js/nav.js"></script>
<script>
const token = localStorage.token;
if(!token) window.location.href = "../login.html";

const CURRENCIES = [
    { code:"USD", flag:"🇺🇸", name:"US Dollar" },
    { code:"EUR", flag:"🇪🇺", name:"Euro" },
    { code:"GBP", flag:"🇬🇧", name:"Pound Sterling" },
    { code:"JPY", flag:"🇯🇵", name:"Japanese Yen" },
    { code:"AUD", flag:"🇦🇺", name:"Australian Dollar" },
    { code:"CAD", flag:"🇨🇦", name:"Canadian Dollar" },
    { code:"NZD", flag:"🇳🇿", name:"New Zealand Dollar" },
    { code:"CHF", flag:"🇨🇭", name:"Swiss Franc" },
];

let activeCcy    = "USD";
let macroData    = null;
let strengthData = null;
let calendarData = null;
let ideasData    = null;

async function loadAll(){
    try {
        [macroData, strengthData, calendarData, ideasData] = await Promise.all([
            fetch(`${API_URL}/macro/matrix`,    { headers:{ "Authorization":`Bearer ${token}` } }).then(r => r.json()),
            fetch(`${API_URL}/currency/strength`,{ headers:{ "Authorization":`Bearer ${token}` } }).then(r => r.json()),
            fetch(`${API_URL}/economic/calendar`,{ headers:{ "Authorization":`Bearer ${token}` } }).then(r => r.json()),
            fetch(`${API_URL}/trade-ideas`,      { headers:{ "Authorization":`Bearer ${token}` } }).then(r => r.json()),
        ]);

        renderTabs();
        renderCard(activeCcy);
        renderCalendar(activeCcy);

    } catch(err) {
        console.error(err);
        document.getElementById("ccyCard").innerHTML = `
            <div style="color:var(--muted); padding:60px; text-align:center;">
                <i class="fas fa-triangle-exclamation" style="font-size:2rem; display:block; margin-bottom:16px; opacity:0.3;"></i>
                Could not load data. Please refresh.
            </div>
        `;
    }
}


function renderTabs(){
    const tabs = document.getElementById("ccyTabs");
    tabs.innerHTML = CURRENCIES.map(c => `
        <button class="currency-tab ${c.code === activeCcy ? "active" : ""}"
            data-ccy="${c.code}"
            style="
                padding:8px 16px; border-radius:20px; font-size:13px;
                font-weight:600; cursor:pointer;
                border:1px solid ${c.code === activeCcy ? "var(--primary)" : "var(--border)"};
                background:${c.code === activeCcy ? "rgba(59,130,246,0.12)" : "var(--card)"};
                color:${c.code === activeCcy ? "white" : "var(--muted)"};
                transition:all 0.2s;
            ">
            ${c.flag} ${c.code}
        </button>
    `).join("");

    tabs.querySelectorAll("button").forEach(btn => {
        btn.addEventListener("click", () => {
            activeCcy = btn.dataset.ccy;
            renderTabs();
            renderCard(activeCcy);
            renderCalendar(activeCcy);
        });
    });
}


function renderCard(ccy){
    const card      = document.getElementById("ccyCard");
    const ccyMeta   = CURRENCIES.find(c => c.code === ccy);
    const macroRow  = macroData?.rows?.find(r => r.currency === ccy);
    const strength  = strengthData?.find ? strengthData.find(s => s.code === ccy) : null;
    const ideas     = (ideasData?.ideas || []).filter(i => i.base === ccy || i.quote === ccy).slice(0, 3);

    if(!macroRow && !strength){
        card.innerHTML = `<div style="color:var(--muted); padding:40px; text-align:center;">No data for ${ccy}</div>`;
        return;
    }

    const overallScore = macroRow?.overall_score ?? 0;
    const overallCol   = overallScore >= 1 ? "#22c55e" : overallScore <= -1 ? "#ef4444" : "#94a3b8";
    const strengthScore = strength?.score ?? 0;
    const strengthTrend = strength?.trend ?? "neutral";

    const DATA_ROWS = [
        { label:"Policy Rate",   value: macroRow?.rate !== null ? macroRow.rate + "%" : "—",          score: macroRow?.scores?.rate },
        { label:"CB Stance",     value: macroRow?.rate_stance ? macroRow.rate_stance.charAt(0).toUpperCase() + macroRow.rate_stance.slice(1) : "—", score: null },
        { label:"Inflation",     value: macroRow?.cpi !== null ? macroRow.cpi + "%" : "—",            score: macroRow?.scores?.cpi },
        { label:"GDP Growth",    value: macroRow?.gdp !== null ? macroRow.gdp + "%" : "—",            score: macroRow?.scores?.gdp },
        { label:"Unemployment",  value: macroRow?.unemployment !== null ? macroRow.unemployment + "%" : "—", score: macroRow?.scores?.unemployment },
        { label:"Current Acc.",  value: macroRow?.current_account !== null ? macroRow.current_account + "%" : "—", score: macroRow?.scores?.current_account },
        { label:"Strength Score",value: strengthScore > 0 ? "+" + strengthScore : String(strengthScore), score: strengthScore >= 10 ? 1 : strengthScore <= -10 ? -1 : 0 },
    ];

    function scoreCol(s){
        if(s === null || s === undefined) return "var(--muted)";
        if(s >= 1)  return "#22c55e";
        if(s <= -1) return "#ef4444";
        return "#94a3b8";
    }

    const ideasHtml = ideas.length > 0
        ? ideas.map(idea => {
            const side = idea.base === ccy ? idea.direction : (idea.direction === "LONG" ? "SHORT" : "LONG");
            const col  = side === "LONG" ? "#22c55e" : "#ef4444";
            return `
                <div style="display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid rgba(255,255,255,0.04);">
                    <span style="font-weight:700; font-size:13px;">${idea.pair}</span>
                    <div style="display:flex; align-items:center; gap:8px;">
                        <span style="font-size:11px; color:var(--muted);">${idea.conviction}</span>
                        <span style="font-size:11px; font-weight:700; color:${col}; background:${col}15; padding:2px 8px; border-radius:6px;">${side}</span>
                    </div>
                </div>
            `;
          }).join("")
        : `<p style="color:var(--muted); font-size:13px; padding:10px 0;">No active ideas for ${ccy}</p>`;

    card.innerHTML = `
        <div style="
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        ">
            <!-- Left: fundamentals -->
            <div style="
                background: var(--card);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 24px;
                border-top: 3px solid ${overallCol};
            ">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <div style="display:flex; align-items:center; gap:10px;">
                        <span style="font-size:28px;">${ccyMeta?.flag || "🌐"}</span>
                        <div>
                            <div style="font-weight:800; font-size:18px;">${ccy}</div>
                            <div style="font-size:12px; color:var(--muted);">${ccyMeta?.name || ""}</div>
                        </div>
                    </div>
                    <div style="text-align:right;">
                        <div style="font-size:1.8rem; font-weight:900; color:${overallCol};">
                            ${overallScore > 0 ? "+" : ""}${overallScore}
                        </div>
                        <div style="font-size:11px; color:var(--muted);">Macro Score</div>
                    </div>
                </div>

                ${DATA_ROWS.map(row => `
                    <div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.04);">
                        <span style="font-size:12px; color:var(--muted);">${row.label}</span>
                        <span style="font-size:13px; font-weight:700; color:${scoreCol(row.score)};">${row.value}</span>
                    </div>
                `).join("")}
            </div>

            <!-- Right: trade ideas + strength -->
            <div style="display:flex; flex-direction:column; gap:16px;">

                <!-- Strength -->
                <div style="
                    background: var(--card);
                    border: 1px solid var(--border);
                    border-radius: 16px;
                    padding: 20px;
                ">
                    <div style="font-size:13px; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:8px;">
                        <i class="fas fa-signal" style="color:var(--primary); font-size:12px;"></i>
                        Intraday Strength
                    </div>
                    <div style="font-size:2rem; font-weight:800; color:${strengthScore > 0 ? "#22c55e" : strengthScore < 0 ? "#ef4444" : "#94a3b8"}; margin-bottom:8px;">
                        ${strengthScore > 0 ? "+" : ""}${strengthScore}
                    </div>
                    <div style="background:rgba(255,255,255,0.05); border-radius:4px; height:8px; overflow:hidden; position:relative; margin-bottom:8px;">
                        <div style="
                            position:absolute;
                            ${strengthScore >= 0 ? "left:50%" : `left:${50 - Math.abs(strengthScore)/2}%`};
                            width:${Math.min(50, Math.abs(strengthScore)/2)}%;
                            height:100%;
                            background:${strengthScore >= 0 ? "#22c55e" : "#ef4444"};
                            border-radius:4px;
                        "></div>
                        <div style="position:absolute; left:50%; top:0; width:1px; height:100%; background:rgba(255,255,255,0.2);"></div>
                    </div>
                    <span style="
                        font-size:11px; font-weight:700;
                        color:${strengthTrend === "bullish" ? "#22c55e" : strengthTrend === "bearish" ? "#ef4444" : "#94a3b8"};
                        text-transform:capitalize;
                    ">${strengthTrend}</span>
                </div>

                <!-- Trade ideas -->
                <div style="
                    background: var(--card);
                    border: 1px solid var(--border);
                    border-radius: 16px;
                    padding: 20px;
                    flex: 1;
                ">
                    <div style="font-size:13px; font-weight:700; margin-bottom:12px; display:flex; align-items:center; gap:8px;">
                        <i class="fas fa-lightbulb" style="color:#f59e0b; font-size:12px;"></i>
                        Related Trade Ideas
                    </div>
                    ${ideasHtml}
                    ${ideas.length > 0 ? `<a href="tradeIdeas.html" style="font-size:12px; color:var(--primary); text-decoration:none; display:block; margin-top:10px;">View all ideas →</a>` : ""}
                </div>
            </div>
        </div>
    `;
}


function renderCalendar(ccy){
    const container = document.getElementById("calendarEvents");

    if(!calendarData || !Array.isArray(calendarData)){
        container.innerHTML = `<p style="color:var(--muted); font-size:13px;">Calendar data unavailable.</p>`;
        return;
    }

    const events = calendarData
        .filter(e => e.country === ccy)
        .slice(0, 8);

    if(events.length === 0){
        container.innerHTML = `
            <div style="color:var(--muted); padding:24px; text-align:center; background:var(--card); border-radius:12px; border:1px solid var(--border);">
                <i class="fas fa-calendar-xmark" style="font-size:1.5rem; opacity:0.2; display:block; margin-bottom:10px;"></i>
                No scheduled events for ${ccy} this week.
            </div>
        `;
        return;
    }

    container.innerHTML = `
        <div style="background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden;">
            ${events.map(ev => {
                const impactCol = ev.impact === "high" ? "#ef4444" : "#f59e0b";
                const hasActual = ev.actual && ev.actual !== "";
                const hasForecast = ev.forecast && ev.forecast !== "";

                return `
                    <div style="display:flex; justify-content:space-between; align-items:center;
                        padding:14px 18px; border-bottom:1px solid rgba(255,255,255,0.04);">
                        <div style="display:flex; align-items:center; gap:12px;">
                            <div style="
                                width:8px; height:8px; border-radius:50%;
                                background:${impactCol}; flex-shrink:0;
                            "></div>
                            <div>
                                <div style="font-size:13px; font-weight:600;">${ev.event}</div>
                                <div style="font-size:11px; color:var(--muted); margin-top:2px;">
                                    ${new Date(ev.date).toLocaleDateString("en-GB", { day:"2-digit", month:"short" })}
                                    — ${ev.impact.charAt(0).toUpperCase() + ev.impact.slice(1)} impact
                                </div>
                            </div>
                        </div>
                        <div style="text-align:right; font-size:12px;">
                            ${hasActual ? `<div style="font-weight:700; color:white;">A: ${ev.actual}</div>` : ""}
                            ${hasForecast ? `<div style="color:var(--muted);">F: ${ev.forecast}</div>` : ""}
                            ${!hasActual && !hasForecast ? `<span style="color:var(--muted);">Upcoming</span>` : ""}
                        </div>
                    </div>
                `;
            }).join("")}
        </div>
    `;
}


document.getElementById("refreshBtn").addEventListener("click", loadAll);
window.onload = loadAll;
</script>
</body>
