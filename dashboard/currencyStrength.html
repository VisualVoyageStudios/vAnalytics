<div class="dashboard-container">

    <main class="main-content">

        <header class="page-header">
            <h2>Currency Strength Meter</h2>
            <div style="display:flex; gap:10px; align-items:center;">
                <span id="lastUpdated" style="font-size:12px; color:var(--muted);"></span>
                <button class="btn-primary" id="refreshBtn" style="padding:10px 18px; border:none; border-radius:10px; cursor:pointer; font-size:13px;">
                    <i class="fas fa-rotate" style="margin-right:6px;"></i>Refresh
                </button>
            </div>
        </header>

        <!-- Strength Gauges -->
        <div class="section-heading">
            <i class="fas fa-signal"></i> Live Strength Scores
        </div>

        <div id="strengthGrid" style="
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        ">
            <div style="color:var(--muted); font-size:13px; padding:40px; text-align:center;">
                <i class="fas fa-spinner fa-spin" style="margin-right:8px;"></i>
                Loading currency data…
            </div>
        </div>

        <!-- Ranking Table -->
        <div class="section-heading">
            <i class="fas fa-trophy"></i> Strength Ranking
        </div>

        <div class="heatmap-table-wrapper">
            <table class="heatmap-table">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Currency</th>
                        <th>Score</th>
                        <th>Strength</th>
                        <th>Bias</th>
                    </tr>
                </thead>
                <tbody id="strengthTable"></tbody>
            </table>
        </div>

        <!-- Pair Matrix -->
        <div class="section-heading" style="margin-top:32px;">
            <i class="fas fa-table-cells"></i> Pair Strength Matrix
        </div>

        <div id="pairMatrix" style="
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
            margin-top: 16px;
        "></div>

    </main>
</div>
