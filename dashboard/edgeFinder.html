<style>
  /* ── Edge Finder scoped styles ── */
  :root {
    --ef-bg: #0d0d0f;
    --ef-card: #141418;
    --ef-border: #222228;
    --ef-accent: #3b82f6;
    --ef-bull: #22c55e;
    --ef-bear: #ef4444;
    --ef-neutral: #a3a3b3;
    --ef-gold: #f59e0b;
    --ef-text: #e2e2f0;
    --ef-sub: #6b6b80;
    --ef-row-hover: #1a1a22;
  }

  .ef-wrapper {
    display: flex;
    flex-direction: column;
    gap: 28px;
    padding: 0 0 40px 0;
  }

  /* ── Top controls bar ── */
  .ef-controls {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }

  .ef-controls select,
  .ef-controls button {
    background: var(--ef-card);
    border: 1px solid var(--ef-border);
    color: var(--ef-text);
    border-radius: 8px;
    padding: 8px 16px;
    font-size: 0.85rem;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    outline: none;
  }

  .ef-controls select:hover,
  .ef-controls button:hover {
    border-color: var(--ef-accent);
  }

  .ef-controls button.active,
  .ef-controls button:focus {
    border-color: var(--ef-accent);
    color: var(--ef-accent);
  }

  .ef-refresh-btn {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--ef-accent) !important;
    border-color: var(--ef-accent) !important;
    color: #fff !important;
    font-weight: 600;
  }

  .ef-refresh-btn:hover {
    opacity: 0.85;
  }

  .ef-refresh-btn.loading i {
    animation: spin 1s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .ef-last-updated {
    font-size: 0.75rem;
    color: var(--ef-sub);
    margin-left: 8px;
    white-space: nowrap;
  }

  /* ── Summary score cards ── */
  .ef-score-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 14px;
  }

  .ef-score-card {
    background: var(--ef-card);
    border: 1px solid var(--ef-border);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }

  .ef-score-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    border-radius: 12px 12px 0 0;
    background: var(--card-accent, var(--ef-neutral));
  }

  .ef-score-card:hover {
    border-color: var(--ef-accent);
    transform: translateY(-2px);
  }

  .ef-score-card .flag {
    font-size: 1.4rem;
    line-height: 1;
  }

  .ef-score-card .country-name {
    font-size: 0.78rem;
    color: var(--ef-sub);
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  .ef-score-card .score-value {
    font-size: 1.6rem;
    font-weight: 700;
    color: var(--ef-text);
    line-height: 1;
  }

  .ef-score-card .score-label {
    font-size: 0.72rem;
    color: var(--ef-sub);
  }

  .ef-score-card .bias-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    width: fit-content;
    margin-top: 4px;
  }

  .bias-bullish { background: rgba(34,197,94,0.12); color: var(--ef-bull); }
  .bias-bearish { background: rgba(239,68,68,0.12); color: var(--ef-bear); }
  .bias-neutral { background: rgba(163,163,179,0.12); color: var(--ef-neutral); }

  /* ── Main ranking table ── */
  .ef-table-section {
    background: var(--ef-card);
    border: 1px solid var(--ef-border);
    border-radius: 14px;
    overflow: hidden;
  }

  .ef-table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    border-bottom: 1px solid var(--ef-border);
    flex-wrap: wrap;
    gap: 12px;
  }

  .ef-table-header h3 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--ef-text);
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0;
  }

  .ef-table-header h3 i {
    color: var(--ef-accent);
    font-size: 0.9rem;
  }

  .ef-legend {
    display: flex;
    gap: 16px;
    font-size: 0.75rem;
    color: var(--ef-sub);
    align-items: center;
  }

  .ef-legend span {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    display: inline-block;
  }

  .dot-bull { background: var(--ef-bull); }
  .dot-bear { background: var(--ef-bear); }
  .dot-neu  { background: var(--ef-neutral); }

  .ef-table-wrap {
    overflow-x: auto;
  }

  table.ef-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.85rem;
  }

  table.ef-table thead tr {
    background: #111116;
  }

  table.ef-table th {
    padding: 12px 18px;
    text-align: left;
    color: var(--ef-sub);
    font-weight: 600;
    font-size: 0.72rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
    border-bottom: 1px solid var(--ef-border);
  }

  table.ef-table th.sortable {
    cursor: pointer;
    user-select: none;
  }

  table.ef-table th.sortable:hover {
    color: var(--ef-text);
  }

  table.ef-table tbody tr {
    border-bottom: 1px solid var(--ef-border);
    transition: background 0.15s;
    cursor: pointer;
  }

  table.ef-table tbody tr:last-child {
    border-bottom: none;
  }

  table.ef-table tbody tr:hover {
    background: var(--ef-row-hover);
  }

  table.ef-table td {
    padding: 14px 18px;
    color: var(--ef-text);
    vertical-align: middle;
    white-space: nowrap;
  }

  .rank-num {
    font-weight: 700;
    color: var(--ef-sub);
    font-size: 0.8rem;
    width: 32px;
  }

  .rank-1 { color: var(--ef-gold); }
  .rank-2 { color: #94a3b8; }
  .rank-3 { color: #cd7f32; }

  .country-cell {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .country-cell .flag-sm { font-size: 1.2rem; }
  .country-cell .cname  { font-weight: 600; }
  .country-cell .ccode  { color: var(--ef-sub); font-size: 0.75rem; }

  .score-bar-wrap {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 140px;
  }

  .score-bar {
    height: 6px;
    border-radius: 4px;
    background: var(--ef-border);
    flex: 1;
    overflow: hidden;
  }

  .score-bar-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.6s ease;
  }

  .fill-bull { background: var(--ef-bull); }
  .fill-bear { background: var(--ef-bear); }
  .fill-neu  { background: var(--ef-neutral); }

  .score-num {
    font-weight: 700;
    min-width: 36px;
    text-align: right;
    font-size: 0.9rem;
  }

  .metric-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 0.72rem;
    font-weight: 600;
  }

  .pill-up   { background: rgba(34,197,94,0.1);  color: var(--ef-bull); }
  .pill-down { background: rgba(239,68,68,0.1);   color: var(--ef-bear); }
  .pill-flat { background: rgba(163,163,179,0.1); color: var(--ef-neutral); }

  .trend-arrow { font-size: 0.75rem; }

  /* ── Pair implications panel ── */
  .ef-pairs-section {
    background: var(--ef-card);
    border: 1px solid var(--ef-border);
    border-radius: 14px;
    overflow: hidden;
  }

  .ef-pairs-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 22px;
    border-bottom: 1px solid var(--ef-border);
    flex-wrap: wrap;
    gap: 12px;
  }

  .ef-pairs-header h3 {
    font-size: 1rem;
    font-weight: 600;
    color: var(--ef-text);
    display: flex;
    align-items: center;
    gap: 8px;
    margin: 0;
  }

  .ef-pairs-header h3 i { color: var(--ef-gold); font-size: 0.9rem; }

  .ef-pairs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 0;
  }

  .ef-pair-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 22px;
    border-bottom: 1px solid var(--ef-border);
    border-right: 1px solid var(--ef-border);
    transition: background 0.15s;
  }

  .ef-pair-row:hover { background: var(--ef-row-hover); }

  .pair-symbol {
    font-weight: 700;
    font-size: 0.9rem;
    letter-spacing: 0.04em;
    color: var(--ef-text);
  }

  .pair-diff {
    font-size: 0.75rem;
    color: var(--ef-sub);
    margin-top: 2px;
  }

  /* ── AI Insight box ── */
  .ef-insight-box {
    background: linear-gradient(135deg, #0f1623 0%, #141418 100%);
    border: 1px solid #1e3a5f;
    border-radius: 14px;
    padding: 22px;
    position: relative;
    overflow: hidden;
  }

  .ef-insight-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--ef-accent), #8b5cf6);
  }

  .ef-insight-box h3 {
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ef-accent);
    margin: 0 0 12px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ef-insight-text {
    font-size: 0.9rem;
    color: var(--ef-text);
    line-height: 1.7;
    min-height: 48px;
  }

  .ef-insight-text.loading-pulse {
    color: var(--ef-sub);
    animation: pulse 1.5s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  /* ── Methodology footer ── */
  .ef-method {
    background: var(--ef-card);
    border: 1px solid var(--ef-border);
    border-radius: 14px;
    padding: 20px 22px;
  }

  .ef-method summary {
    font-size: 0.82rem;
    color: var(--ef-sub);
    cursor: pointer;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    list-style: none;
    outline: none;
    user-select: none;
  }

  .ef-method summary i { color: var(--ef-accent); }
  .ef-method[open] summary { color: var(--ef-text); margin-bottom: 14px; }

  .ef-method-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
    margin-top: 4px;
  }

  .ef-method-item {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .ef-method-item strong {
    font-size: 0.8rem;
    color: var(--ef-text);
  }

  .ef-method-item p {
    font-size: 0.75rem;
    color: var(--ef-sub);
    margin: 0;
    line-height: 1.5;
  }

  /* ── Empty / error states ── */
  .ef-empty {
    text-align: center;
    padding: 40px;
    color: var(--ef-sub);
    font-size: 0.85rem;
  }

  .ef-empty i { display: block; font-size: 2rem; margin-bottom: 10px; opacity: 0.3; }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .ef-score-grid { grid-template-columns: repeat(2, 1fr); }
    .ef-pairs-grid { grid-template-columns: 1fr; }
    .ef-method-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>

<div class="dashboard-container">

<main class="main-content">
    <header class="page-header">
        <h2>Edge Finder</h2>
        <span id="ef-last-updated" style="font-size:12px; color:var(--muted);"></span>
    </header>

    <!-- Asset selector tabs -->
    <div style="margin-bottom:24px;">
        <p style="font-size:11px; color:var(--muted); margin-bottom:10px; text-transform:uppercase; letter-spacing:1px;">Currencies</p>
        <div style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:12px;" id="ccy-tabs"></div>
        <p style="font-size:11px; color:var(--muted); margin-bottom:10px; text-transform:uppercase; letter-spacing:1px;">Metals</p>
        <div style="display:flex; gap:8px; flex-wrap:wrap;" id="metal-tabs"></div>
    </div>

    <!-- Loading state -->
    <div id="scorecard-loading" style="text-align:center; padding:60px; color:var(--muted);">
        <i class="fas fa-spinner fa-spin" style="font-size:2rem; display:block; margin-bottom:16px; opacity:0.3;"></i>
        Loading scorecard…
    </div>

    <!-- Main scorecard -->
    <div id="scorecard-content" style="display:none;">

        <!-- Top row: gauge + overall scores -->
        <div style="display:grid; grid-template-columns:280px 1fr; gap:20px; margin-bottom:24px;" id="scorecard-top">

            <!-- Gauge -->
            <div style="
                background:var(--card); border:1px solid var(--border);
                border-radius:16px; padding:24px; text-align:center;
            ">
                <div style="font-size:13px; color:var(--muted); margin-bottom:16px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px;">
                    EdgeFinder Score <i class="info-tip" data-tip="A composite score from -10 to +10 combining economic growth, inflation, jobs data and institutional positioning. Positive = fundamentally bullish, negative = bearish.">i</i>

                </div>
                <div id="gauge-container" style="position:relative; width:200px; height:120px; margin:0 auto 16px;">
                    <svg width="200" height="120" viewBox="0 0 200 120">
                        <!-- Background arc -->
                        <path d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="16" stroke-linecap="round"/>
                        <!-- Bearish zone -->
                        <path d="M 20 100 A 80 80 0 0 1 100 20" fill="none" stroke="rgba(239,68,68,0.3)" stroke-width="16" stroke-linecap="round"/>
                        <!-- Bullish zone -->
                        <path d="M 100 20 A 80 80 0 0 1 180 100" fill="none" stroke="rgba(34,197,94,0.3)" stroke-width="16" stroke-linecap="round"/>
                        <!-- Dynamic fill arc -->
                        <path id="gauge-fill" d="M 20 100 A 80 80 0 0 1 180 100" fill="none" stroke="#94a3b8" stroke-width="16" stroke-linecap="round" stroke-dasharray="0 251"/>
                        <!-- Needle -->
                        <line id="gauge-needle" x1="100" y1="100" x2="100" y2="28" stroke="white" stroke-width="2.5" stroke-linecap="round" transform="rotate(0, 100, 100)"/>
                        <circle cx="100" cy="100" r="5" fill="white"/>
                        <!-- Labels -->
                        <text x="14" y="116" fill="#ef4444" font-size="10" font-weight="700">-10</text>
                        <text x="96" y="14" fill="#94a3b8" font-size="10" font-weight="700" text-anchor="middle">0</text>
                        <text x="175" y="116" fill="#22c55e" font-size="10" font-weight="700" text-anchor="end">+10</text>
                    </svg>
                </div>
                <div id="gauge-score" style="font-size:2.5rem; font-weight:900; margin-bottom:4px;">0</div>
                <div id="gauge-label" style="font-size:13px; font-weight:700; padding:4px 16px; border-radius:20px; display:inline-block;">Neutral</div>

                <div style="margin-top:20px; display:flex; flex-direction:column; gap:8px;" id="score-breakdown"></div>
            </div>

            <!-- Section cards -->
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px;" id="section-summary"></div>
        </div>

        <!-- COT positioning row -->
        <div id="cot-row" style="margin-bottom:20px;"></div>

        <!-- Detailed section tables -->
        <div id="section-tables" style="display:flex; flex-direction:column; gap:16px;"></div>

    </div>
</main>
