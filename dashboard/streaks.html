<div class="dashboard-container">

    <main class="main-content">

        <header class="page-header">
            <h2>Win / Loss Streak Tracker</h2>
        </header>

        <!-- Current Streak -->
        <div id="currentStreak" style="margin-bottom: 28px;"></div>

        <!-- Streak Stats -->
        <div id="streakStats" style="
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        "></div>

        <!-- Streak History -->
        <div class="section-heading">
            <i class="fas fa-history"></i> Recent Streak History
        </div>

        <div id="streakHistory" style="
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 16px;
            margin-bottom: 32px;
        "></div>

        <!-- Streak Timeline -->
        <div class="section-heading">
            <i class="fas fa-chart-bar"></i> Streak Timeline
        </div>

        <div class="chart-container">
            <canvas id="streakChart"></canvas>
        </div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="../js/api.js"></script>
<script src="../js/pgAnime.js"></script>
<script src="../js/nav.js"></script>
<script>
const token = localStorage.token;
if(!token) window.location.href = "../login.html";

async function loadStreaks(){
    try {
        const res  = await fetch(`${API_URL}/analytics/streaks`, {
            headers: { "Authorization": `Bearer ${token}` }
        });
        const data = await res.json();

        renderCurrentStreak(data);
        renderStreakStats(data);
        renderStreakHistory(data.streak_history);
        renderStreakChart(data.streak_history);

    } catch(err) {
        console.error(err);
    }
}


function renderCurrentStreak(data){
    const isWin  = data.current_streak_type === "win";
    const color  = isWin ? "var(--success)" : "var(--danger)";
    const bg     = isWin ? "rgba(34,197,94,0.08)" : "rgba(239,68,68,0.08)";
    const border = isWin ? "rgba(34,197,94,0.2)"  : "rgba(239,68,68,0.2)";
    const emoji  = isWin ? "🔥" : "❄️";
    const label  = isWin ? "Win Streak" : "Loss Streak";

    document.getElementById("currentStreak").innerHTML = `
        <div style="
            background: ${bg};
            border: 1px solid ${border};
            border-radius: 20px;
            padding: 32px;
            text-align: center;
        ">
            <div style="font-size: 3.5rem; margin-bottom: 8px;">${emoji}</div>
            <div style="
                font-size: 4rem;
                font-weight: 900;
                color: ${color};
                line-height: 1;
                margin-bottom: 8px;
            ">${data.current_streak}</div>
            <div style="
                font-size: 16px;
                font-weight: 700;
                color: ${color};
                margin-bottom: 6px;
            ">Current ${label}</div>
            <div style="font-size: 13px; color: var(--muted);">
                ${isWin
                    ? "Keep going — you're on a roll!"
                    : "Stay disciplined — streaks always turn around."
                }
            </div>
        </div>
    `;
}


function renderStreakStats(data){
    const stats = [
        {
            label: "Best Win Streak",
            value: data.best_win_streak,
            icon:  "fa-trophy",
            color: "var(--success)"
        },
        {
            label: "Worst Loss Streak",
            value: data.worst_loss_streak,
            icon:  "fa-skull",
            color: "var(--danger)"
        },
        {
            label: "Longest Win Streak",
            value: data.longest_win_streak,
            icon:  "fa-fire",
            color: "#f59e0b"
        },
        {
            label: "Longest Loss Streak",
            value: data.longest_loss_streak,
            icon:  "fa-snowflake",
            color: "#3b82f6"
        }
    ];

    document.getElementById("streakStats").innerHTML = stats.map(s => `
        <div class="metric-card" style="text-align:center;">
            <div style="
                width: 44px; height: 44px;
                background: ${s.color}15;
                border-radius: 12px;
                display: flex; align-items: center; justify-content: center;
                margin: 0 auto 12px;
                font-size: 18px;
                color: ${s.color};
            ">
                <i class="fas ${s.icon}"></i>
            </div>
            <h3>${s.label}</h3>
            <p style="font-size: 2.2rem; font-weight: 800; color: ${s.color};">
                ${s.value}
            </p>
        </div>
    `).join("");
}


function renderStreakHistory(history){
    const container = document.getElementById("streakHistory");

    if(!history || history.length === 0){
        container.innerHTML = `
            <p style="color:var(--muted); font-size:13px;">No streak history yet.</p>
        `;
        return;
    }

    container.innerHTML = [...history].reverse().map(s => {
        const isWin  = s.type === "win";
        const color  = isWin ? "var(--success)" : "var(--danger)";
        const bg     = isWin ? "rgba(34,197,94,0.08)" : "rgba(239,68,68,0.08)";
        const border = isWin ? "rgba(34,197,94,0.2)" : "rgba(239,68,68,0.2)";
        const emoji  = isWin ? "🔥" : "❄️";

        return `
            <div style="
                background: ${bg};
                border: 1px solid ${border};
                border-radius: 10px;
                padding: 10px 16px;
                display: flex;
                align-items: center;
                gap: 8px;
                font-size: 13px;
            ">
                <span>${emoji}</span>
                <span style="font-weight:700; color:${color};">${s.length}</span>
                <span style="color:var(--muted);">${s.type}</span>
                <span style="color:var(--muted); font-size:11px;">${s.date}</span>
            </div>
        `;
    }).join("");
}


function renderStreakChart(history){
    if(!history || history.length === 0) return;

    const labels = history.map((s, i) => `#${i + 1}`);
    const data   = history.map(s => s.type === "win" ? s.length : -s.length);
    const colors = history.map(s => s.type === "win"
        ? "rgba(34,197,94,0.7)"
        : "rgba(239,68,68,0.7)"
    );

    new Chart(document.getElementById("streakChart"), {
        type: "bar",
        data: {
            labels,
            datasets: [{
                label:           "Streak Length",
                data,
                backgroundColor: colors,
                borderRadius:    4
            }]
        },
        options: {
            responsive: true,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: (ctx) => {
                            const s = history[ctx.dataIndex];
                            return `${s.type === "win" ? "Win" : "Loss"} streak of ${s.length} — ${s.date}`;
                        }
                    }
                }
            },
            scales: {
                x: {
                    ticks: { color: "#94a3b8" },
                    grid:  { color: "rgba(255,255,255,0.03)" }
                },
                y: {
                    ticks: {
                        color: "#94a3b8",
                        callback: v => Math.abs(v)
                    },
                    grid: { color: "rgba(255,255,255,0.05)" }
                }
            }
        }
    });
}

window.onload = loadStreaks;
</script>
