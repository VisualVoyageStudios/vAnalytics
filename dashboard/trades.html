<div class="dashboard-container">

    <main class="main-content">

        <header class="page-header skeleton">
            <button id="exportBtn" class="btn-primary" style="border:none; cursor:pointer;">
                <i class="fas fa-cloud-arrow-up"></i> Export
            </button>
        </header>

        <section class="filters skeleton">

            <input
                type="text"
                id="searchTrade"
                placeholder="Search Symbol..."
            >

            <select id="directionFilter">
                <option value="">All Trades</option>
                <option value="BUY">BUY</option>
                <option value="SELL">SELL</option>
            </select>

            <select id="resultFilter">
                <option value="">All Results</option>
                <option value="profit">Profit</option>
                <option value="loss">Loss</option>
            </select>

        </section>

        <!-- Trade Log card -->
        <section class="section-card skeleton">

            <div class="section-card-header">
                <div>
                    <h3>Trade Log</h3>
                    <p>Select a trade to view its details</p>
                </div>
            </div>

            <table class="data-table">
                <thead>
                    <tr>

                        <th>Symbol</th>

                        <th>Type</th>

                        <th>Lot Size</th>

                        <th>Profit</th>

                        <th>Date</th>

                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="tradesTable">

                </tbody>
            </table>
        </section>

        <!-- Summary strip -->
        <section class="dashboard-grid skeleton">

            <div class="metric-card">
                <h3>Total Profit</h3>
                <p id="totalProfit">$0</p>
            </div>

            <div class="metric-card">
                <h3>Win Rate</h3>
                <p id="winRate">0%</p>
            </div>

            <div class="metric-card">
                <h3>Profit Factor</h3>
                <p id="bestTrade">$0</p>
            </div>

            <div class="metric-card">
                <h3>Drawdown</h3>
                <p id="worstTrade">$0</p>
            </div>

        </section>

    </main>

</div>
